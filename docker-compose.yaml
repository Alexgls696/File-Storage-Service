networks:
  app-network:
    driver: bridge

volumes:
  files_db_data:
  files_storage_data:

services:
  file-storage-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - files_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-files_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  file-storage-service:
    build: FileStorageServiceBackend
    container_name: file-storage-service
    ports:
      - "8080:8080"
    environment:
      - FILE_STORAGE_PATH=/app/data
      - FILES_STORAGE_DB_URL=jdbc:postgresql://file-storage-db:5432/files_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - files_storage_data:/app/data
    depends_on:
      file-storage-db:
        condition: service_healthy
    networks:
      app-network:

